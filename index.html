<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>دعوة خطوبة</title>

<style>
*{
    margin:0;
    padding:0;
    /* box-sizing:border-box; */
    font-family: Arial, sans-serif;
}

body{
    background:#e3afaf;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
}

/* floating hearts */
.heart{
    position:absolute;
    color:#ff4f88;
    font-size:24px;
    animation: float 8s linear infinite;
    opacity:.7;
}

@keyframes float{
    0%{
        transform:translateY(100vh) scale(.5);
        opacity:0;
    }
    20%{opacity:1;}
    100%{
        transform:translateY(-100vh) scale(1.4);
        opacity:0;
    }
}

.container{
    text-align:center;
    position:relative;
}

h1{
    color:#b32d5d;
    margin-bottom:20px;
    font-size:40px;
}

.subtitle{
    color:#333;
    margin-bottom:15px;
}

/* envelope */
.envelope{
    position:relative;
    width:320px;
    height:220px;
    margin:auto;
    cursor:pointer;
    transition:all 1s ease;
}

.body-envelope{
    position:absolute;
    width:100%;
    height:100%;
    /* background:#f8a9bf; */
    background-image: url("./one.png");
    /* background: no-repeat ; */
    /* background-size: cover; */
    background-size: cover;
    border-radius:10px;
    bottom:0;
    z-index:2;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.flap{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    clip-path: polygon(0 0,100% 0,50% 60%);
    background:#e3afaf;
    transform-origin:top;
    transition:1s;
    z-index:4;
   /* background-image: url(./Screenshot\ 2026-05-11\ 195732-Photoroom.png); */
}

/* heart seal */
.seal{
    position:absolute;
    top:90px;
    left:50%;
    transform:translateX(-50%);
    font-size:45px;
    z-index:5;
}

/* card */
.card{
    position:absolute;
    width:100%;
    height:400px;
    /* background:#c41313; */
    /* border-radius:18px; */
    left:50%;
    bottom:0px;
    transform:translateX(-50%);
    padding:20px;
    transition:1.2s;
    z-index:1;
    background-image: url(./two2.png);
    background-size: cover;
    /* transform:rotateX(90deg);
    o */
    opacity: 0;
 background-color: #e3afaf;
}

.card h2{
    color:#c93368;
    margin-bottom:10px;
    font-size:34px;
}

.names{
    font-size:42px;
    font-weight:bold;
    color:#111;
    margin:20px 0;
}

.date{
    font-size:28px;
    color:#444;
    margin-bottom:20px;
}

.countdown{
    font-size:24px;
    color:#ff4f81;
    font-weight:bold;
    margin:15px 0;
}


.box{
    background:#ffd6e4;
    padding:10px;
    border-radius:10px;
    min-width:55px;
    font-weight:bold;
    color:#b32d5d;
}

.map-btn{
    display:inline-block;
    padding:14px 24px;
    background:#ff4f88;
    color:white;
    text-decoration:none;
    border-radius:14px;
    font-size:18px;
}

/* open state */
.envelope.open .flap{
    transform:rotateX(180deg);
    z-index:0;
}

.envelope.open .card{
    /* transform:translateX(-50%) translateY(-260px); */
    z-index: 1000;
    opacity:1;

}

.envelope.open{
    transform:scale(.9);
}
.body-envelope.open{
    opacity: 0;
}

.click-text{
    margin-top:15px;
    color:#444;
    font-size:18px;
}
</style>
</head>
<body>

<!-- hearts -->
<script>
for(let i=0;i<25;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="💗";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(5+Math.random()*5)+"s";
    heart.style.fontSize=(20+Math.random()*30)+"px";
    document.body.appendChild(heart);
}
</script>

<script>
function toggleEnvelope(){
    document.getElementById("env").classList.toggle("open");
}
const countdown = document.getElementById("countdown");
const day = document.getElementById("day");
const targetDate = new Date("May 15, 2026 20:00:00").getTime();

setInterval(() => {
    const now = new Date().getTime();
    const distance = targetDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
    const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
    const seconds = Math.floor((distance % (1000*60)) / 1000);

    countdown.innerHTML =
        `${seconds}S:${minutes}M:${hours}H  : ${days}D `;
  
    day.innerHTML =
        `${days} يوم `;
    hours.innerHTML =
        `${hours} يوم `;
    minutes.innerHTML =
        `${minutes} يوم `;
    seconds.innerHTML =
        `${seconds} يوم `;
}, 1000);

</script>
