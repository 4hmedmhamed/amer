<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>دعوة خطوبة</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background: linear-gradient(180deg,#ffd6e4,#ffc4d8);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    position:relative;
}

/* floating hearts */
.heart{
    position:absolute;
    color:#ff4f88;
    font-size:24px;
    animation: float 8s linear infinite;
    opacity:.7;
}

@keyframes float{
    0%{
        transform:translateY(100vh) scale(.5);
        opacity:0;
    }
    20%{opacity:1;}
    100%{
        transform:translateY(-100vh) scale(1.4);
        opacity:0;
    }
}

.container{
    text-align:center;
    position:relative;
}

h1{
    color:#b32d5d;
    margin-bottom:20px;
    font-size:40px;
}

.subtitle{
    color:#333;
    margin-bottom:15px;
}

/* envelope */
.envelope{
    position:relative;
    width:320px;
    height:220px;
    margin:auto;
    cursor:pointer;
    transition:all 1s ease;
}

.body-envelope{
    position:absolute;
    width:100%;
    height:100%;
    background:#f8a9bf;
    border-radius:10px;
    bottom:0;
    z-index:2;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
}

.flap{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    clip-path: polygon(0 0,100% 0,50% 60%);
    background:#f7bdd0;
    transform-origin:top;
    transition:1s;
    z-index:4;
}

/* heart seal */
.seal{
    position:absolute;
    top:90px;
    left:50%;
    transform:translateX(-50%);
    font-size:45px;
    z-index:5;
}

/* card */
.card{
    position:absolute;
    width:270px;
    height:360px;
    background:#fff8f8;
    border-radius:18px;
    left:50%;
    bottom:20px;
    transform:translateX(-50%);
    padding:20px;
    box-shadow:0 15px 30px rgba(0,0,0,.18);
    transition:1.2s;
    z-index:1;
}

.card h2{
    color:#c93368;
    margin-bottom:10px;
    font-size:34px;
}

.names{
    font-size:42px;
    font-weight:bold;
    color:#111;
    margin:20px 0;
}

.date{
    font-size:28px;
    color:#444;
    margin-bottom:20px;
}

.countdown{
    display:flex;
    justify-content:center;
    gap:8px;
    margin-bottom:20px;
}

.box{
    background:#ffd6e4;
    padding:10px;
    border-radius:10px;
    min-width:55px;
    font-weight:bold;
    color:#b32d5d;
}

.map-btn{
    display:inline-block;
    padding:14px 24px;
    background:#ff4f88;
    color:white;
    text-decoration:none;
    border-radius:14px;
    font-size:18px;
}

/* open state */
.envelope.open .flap{
    transform:rotateX(180deg);
    z-index:0;
}

.envelope.open .card{
    transform:translateX(-50%) translateY(-260px);
}

.envelope.open{
    transform:scale(.9);
}

.click-text{
    margin-top:15px;
    color:#444;
    font-size:18px;
}
</style>
</head>
<body>

<!-- hearts -->
<script>
for(let i=0;i<25;i++){
    let heart=document.createElement("div");
    heart.className="heart";
    heart.innerHTML="💗";
    heart.style.left=Math.random()*100+"vw";
    heart.style.animationDuration=(5+Math.random()*5)+"s";
    heart.style.fontSize=(20+Math.random()*30)+"px";
    document.body.appendChild(heart);
}
</script>

<div class="container">
    <h1>دعوة خاصة لحضور خطوبتنا 💕</h1>
    <p class="subtitle">اضغط على الجواب</p>

    <div class="envelope" onclick="toggleEnvelope()" id="env">
        <div class="card">
            <p>يسرنا دعوتكم لحضور</p>
            <h2>حفل خطوبة</h2>

            <div class="names">عمرو 💗 نور</div>

            <div class="date">يوم الجمعة <br>15 / 5</div>

            <div class="countdown">
                <div class="box">05<br>يوم</div>
                <div class="box">23<br>ساعة</div>
                <div class="box">47<br>دقيقة</div>
                <div class="box">36<br>ثانية</div>
            </div>

            <a href="#" class="map-btn">📍 موقع الخطوبة</a>
        </div>

        <div class="body-envelope"></div>
        <div class="flap"></div>
        <div class="seal">💗</div>
    </div>

    <div class="click-text">اضغط للفتح / الغلق</div>
</div>

<script>
function toggleEnvelope(){
    document.getElementById("env").classList.toggle("open");
}
</script>

</body>
</html>
